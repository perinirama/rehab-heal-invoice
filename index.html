  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FCF5F1;
      --blush: #F5ECE6;
      --white: #FFFFFF;
      --dark: #000000;
      --mid: #000000;
      --border: #E8DDD8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--cream);
    }

    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }

    .login-logo {
      width: 240px;
      height: 130px;
      background: var(--dark);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      padding: 16px 20px;
      overflow: hidden;
    }

    .login-logo svg { width: 100%; height: 100%; }

    .login-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 12px;
      color: var(--dark);
      opacity: 0.45;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .login-input-wrap { position: relative; margin-bottom: 12px; }

    .login-input-wrap input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      background: var(--cream);
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
    }

    .login-input-wrap input:focus { border-color: var(--dark); }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--dark);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    .login-btn:active { opacity: 0.8; }

    .login-error {
      color: #b05050;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    /* ── APP ── */
    .app-screen { display: none; flex-direction: column; min-height: 100vh; }

    .app-header { justify-content: center !important;
      background: var(--dark);
      padding: 20px 24px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-logo { height: 64px; width: auto; flex-shrink: 0; display:flex; align-items:center; }

    .header-text h1 {
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--white);
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .app-body {
      padding: 24px 20px 60px;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── SECTIONS ── */
    .section {
      background: var(--white);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dark);
      opacity: 0.4;
      margin-bottom: 16px;
    }

    /* ── FORM FIELDS ── */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--dark);
      margin-bottom: 6px;
      opacity: 0.6;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--dark);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--dark); }

    .field textarea { resize: vertical; min-height: 72px; }

    .field-note {
      font-size: 11px;
      color: #1a7a4a;
      margin-top: 5px;
    }

    .clear-address-btn {
      margin-top: 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--dark);
      opacity: 0.45;
      padding: 5px 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .clear-address-btn:hover { opacity: 0.8; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .price-display {
      padding: 12px 14px;
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      color: var(--dark);
      min-height: 46px;
    }

    /* ── CLIENT SEARCH ── */
    .client-search-wrap { position: relative; }

    .client-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--white);
      border: 1.5px solid var(--dark);
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 20;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .client-dropdown.open { display: block; }

    .client-option {
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .client-option:last-child { border-bottom: none; }
    .client-option:hover { background: var(--cream); }

    .client-option-name { font-size: 14px; font-weight: 500; }
    .client-option-email { font-size: 12px; opacity: 0.5; margin-top: 2px; }

    /* ── TOTALS ── */
    .totals-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .totals-row:last-child { border-bottom: none; }
    .totals-row.total { font-weight: 600; font-size: 16px; padding-top: 14px; }

    /* ── DISCOUNT ── */
    .discount-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: end; }

    .discount-type-btn {
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .discount-type-btn.active {
      background: var(--dark);
      color: var(--white);
      border-color: var(--dark);
    }

    /* ── ACTIONS ── */
    .action-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .action-btn:active { transform: scale(0.98); opacity: 0.85; }

    .action-btn.primary { background: var(--dark); color: var(--white); }
    .action-btn.secondary {
      background: transparent;
      color: var(--dark);
      border: 1.5px solid var(--border);
    }

    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── STATUS BADGE ── */
    .status-row { display: flex; gap: 10px; }

    .status-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .status-btn.active.paid { background: #1a7a4a; color: white; border-color: #1a7a4a; }
    .status-btn.active.unpaid { background: #b05050; color: white; border-color: #b05050; }

    /* ── INVOICE NUMBER ── */
    .invoice-number-display {
      font-size: 28px;
      font-weight: 600;
      color: var(--dark);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .invoice-number-sub {
      font-size: 12px;
      opacity: 0.4;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .app-body { animation: fadeUp 0.3s ease both; }

<script>
  const PASSWORD = '1982';
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYzb7uXCvn75TjVXtFQOPT927Uacw6Djy2zCqsp4FkT2R5gXAwJszFk7KlF3ObwDYZ/exec';
  const INVOICE_CACHE_KEY = 'rh_invoice_num';
  const JSONBIN_BIN_ID = '69a4219843b1c97be9a911ef';
  const JSONBIN_API_KEY = '$2a$10$zr0RISy76L8WPPYo802x6uXnKek1vKYgCq1gQeB/6OmFKX0.odTsq';

  // ── TREATMENTS DATA ──────────────────────────────────────────────

  // ── AUTH ─────────────────────────────────────────────────────────
  function checkPassword() {
    const input = document.getElementById('password-input').value;
    const error = document.getElementById('login-error');
    if (input === PASSWORD) {
      sessionStorage.setItem('rh_auth', '1');
      showApp();
    } else {
      error.style.display = 'block';
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').focus();
    }
  }

  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    initialise();
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (sessionStorage.getItem('rh_auth') === '1') showApp();
  });

  // ── INIT ─────────────────────────────────────────────────────────
  async function initialise() {
    setDefaultDates();
    await generateInvoiceNumber();
    loadTreatments();
    loadClients();
  }

  function setDefaultDates() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    const todayStr = `${yyyy}-${mm}-${dd}`;

    const due = new Date(today);
    due.setDate(due.getDate() + 7);
    const dueStr = `${due.getFullYear()}-${String(due.getMonth()+1).padStart(2,'0')}-${String(due.getDate()).padStart(2,'0')}`;

    document.getElementById('invoice-date').value = todayStr;
    document.getElementById('due-date').value = dueStr;
    document.getElementById('treatment-date').value = todayStr;
  }

  // ── INVOICE NUMBER ───────────────────────────────────────────────
  const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

  function setInvoiceDisplay(num) {
    currentInvoiceNumber = num;
    document.getElementById('invoice-number-display').value = num;
  }

  function buildInvoiceNumber(year, last) {
    return `RH${year}${String(last).padStart(4, '0')}`;
  }

  // Read from JSONBin; fall back to localStorage if offline
  async function generateInvoiceNumber() {
    const year = new Date().getFullYear().toString().slice(-2);
    try {
      const res = await fetch(`${JSONBIN_URL}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
      });
      if (!res.ok) throw new Error('JSONBin fetch failed');
      const json = await res.json();
      const data = json.record;
      const nextNum = (data.year === year) ? data.last + 1 : 10;
      // Cache locally as backup
      localStorage.setItem(INVOICE_CACHE_KEY, JSON.stringify({ year, last: nextNum - 1 }));
      setInvoiceDisplay(buildInvoiceNumber(year, nextNum));
    } catch (e) {
      // Offline fallback — use localStorage
      const stored = localStorage.getItem(INVOICE_CACHE_KEY);
      let nextNum = 10;
      if (stored) {
        const parsed = JSON.parse(stored);
        if (parsed.year === year) nextNum = parsed.last + 1;
      }
      setInvoiceDisplay(buildInvoiceNumber(year, nextNum));
    }
  }

  // Write to JSONBin after generating; also update localStorage cache
  async function saveInvoiceNumber() {
    const year = new Date().getFullYear().toString().slice(-2);
    const used = document.getElementById('invoice-number-display').value.trim() || currentInvoiceNumber;
    const match = used.match(/(\d{4})$/);
    const lastNum = match ? parseInt(match[1], 10) : 10;

    const payload = { year, last: lastNum };
    localStorage.setItem(INVOICE_CACHE_KEY, JSON.stringify(payload));

    try {
      await fetch(JSONBIN_URL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify(payload)
      });
    } catch (e) {
      // Silent fail — localStorage already updated as backup
    }

    // Refresh display for next invoice
    generateInvoiceNumber();
  }

  // ── TREATMENTS ───────────────────────────────────────────────────
  function loadTreatments() {
    const select = document.getElementById('treatment-select');
    TREATMENTS.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.name;
      opt.textContent = t.name;
      select.appendChild(opt);
    });

    select.addEventListener('change', onTreatmentChange);
    document.getElementById('duration-select').addEventListener('change', onDurationChange);
    document.getElementById('discount-value').addEventListener('input', updateTotals);
  }

  function onTreatmentChange() {
    const name = document.getElementById('treatment-select').value;
    const durationSelect = document.getElementById('duration-select');
    durationSelect.innerHTML = '<option value="">Select duration…</option>';
    durationSelect.disabled = !name;
    currentPrice = 0;
    document.getElementById('price-display').textContent = '—';
    updateTotals();

    if (!name) return;
    const treatment = TREATMENTS.find(t => t.name === name);
    if (!treatment) return;

    treatment.options.forEach(opt => {
      const el = document.createElement('option');
      el.value = opt.price;
      el.textContent = `${opt.label} — £${opt.price.toFixed(2)}`;
      durationSelect.appendChild(el);
    });

    // Auto-select if only one option
    if (treatment.options.length === 1) {
      durationSelect.value = treatment.options[0].price;
      onDurationChange();
    }
  }

  function onDurationChange() {
    const val = document.getElementById('duration-select').value;
    currentPrice = val ? parseFloat(val) : 0;
    document.getElementById('price-display').textContent = currentPrice ? `£${currentPrice.toFixed(2)}` : '—';
    updateTotals();
  }

  // ── TOTALS ───────────────────────────────────────────────────────
  function updateTotals() {
    const discountVal = parseFloat(document.getElementById('discount-value').value) || 0;
    const subtotal = currentPrice;
    let discountAmount = 0;

    if (discountType === 'pct') {
      discountAmount = subtotal * (discountVal / 100);
      document.getElementById('discount-row-label').textContent = `Discount (${discountVal}%)`;
    } else {
      discountAmount = Math.min(discountVal, subtotal);
      document.getElementById('discount-row-label').textContent = `Discount (fixed)`;
    }

    const total = subtotal - discountAmount;
    document.getElementById('subtotal-display').textContent = `£${subtotal.toFixed(2)}`;
    document.getElementById('discount-display').textContent = `-£${discountAmount.toFixed(2)}`;
    document.getElementById('total-display').textContent = `£${total.toFixed(2)}`;
  }

  function setDiscountType(type) {
    discountType = type;
    document.getElementById('disc-pct-btn').className = 'status-btn' + (type === 'pct' ? ' active paid' : '');
    document.getElementById('disc-fixed-btn').className = 'status-btn' + (type === 'fixed' ? ' active paid' : '');
    document.getElementById('discount-label').textContent = type === 'pct' ? 'Discount %' : 'Discount £';
    document.getElementById('discount-value').max = type === 'pct' ? 100 : '';
    updateTotals();
  }

  // ── STATUS ───────────────────────────────────────────────────────
  function setStatus(status) {
    invoiceStatus = status;
    document.getElementById('status-paid-btn').className = 'status-btn' + (status === 'paid' ? ' active paid' : '');
    document.getElementById('status-unpaid-btn').className = 'status-btn' + (status === 'unpaid' ? ' active unpaid' : '');
  }

  // ── CLIENTS ──────────────────────────────────────────────────────
  function fetchClientsJSONP() {
    return new Promise((resolve, reject) => {
      const callbackName = 'rhInvCallback_' + Date.now();
      const script = document.createElement('script');
      const timeout = setTimeout(() => {
        cleanup();
        reject(new Error('Timeout'));
      }, 10000);

      window[callbackName] = function(data) {
        cleanup();
        resolve(data);
      };

      function cleanup() {
        clearTimeout(timeout);
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      script.src = SCRIPT_URL + '?callback=' + callbackName;
      script.onerror = () => { cleanup(); reject(new Error('Script error')); };
      document.head.appendChild(script);
    });
  }

  async function loadClients() {
    const cached = localStorage.getItem('rh_clients_cache');
    if (cached) {
      try { allClients = JSON.parse(cached); } catch(e) {}
    }
    try {
      const data = await fetchClientsJSONP();
      allClients = data.filter(c => c.name);
      localStorage.setItem('rh_clients_cache', JSON.stringify(allClients));
    } catch(e) {}
    // Merge in any manually added clients
    const manual = getManualClients();
    manual.forEach(m => {
      if (!allClients.find(c => c.email === m.email)) allClients.push(m);
    });
    setupClientSearch();
  }

  function setupClientSearch() {
    const input = document.getElementById('client-search');
    const dropdown = document.getElementById('client-dropdown');

    input.addEventListener('input', () => {
      const q = input.value.toLowerCase().trim();
      dropdown.innerHTML = '';
      if (!q) { dropdown.classList.remove('open'); return; }

      const matches = allClients.filter(c => c.name.toLowerCase().includes(q)).slice(0, 8);
      if (!matches.length) { dropdown.classList.remove('open'); return; }

      matches.forEach(c => {
        const div = document.createElement('div');
        div.className = 'client-option';
        div.innerHTML = `<div class="client-option-name">${c.name}</div><div class="client-option-email">${c.email || ''}</div>`;
        div.addEventListener('click', () => {
          selectedClient = c;
          input.value = c.name;
          document.getElementById('client-email').value = c.email || '';
          document.getElementById('client-phone').value = c.phone || '';
          loadAddressForClient(c.email);
          dropdown.classList.remove('open');
          document.getElementById('manual-client-fields').style.display = 'none';
          document.getElementById('client-phone').readOnly = true;
          document.getElementById('client-phone').style.opacity = '0.6';
        });
        dropdown.appendChild(div);
      });

      dropdown.classList.add('open');
    });

    document.addEventListener('click', e => {
      if (!input.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('open');
      }
    });
  }

  const ADDRESS_CACHE_KEY = 'rh_client_addresses';

  function getAddressCache() {
    try { return JSON.parse(localStorage.getItem(ADDRESS_CACHE_KEY)) || {}; } catch(e) { return {}; }
  }

  function saveAddressCache(cache) {
    localStorage.setItem(ADDRESS_CACHE_KEY, JSON.stringify(cache));
  }

  function loadAddressForClient(email) {
    if (!email) return;
    const cache = getAddressCache();
    const saved = cache[email];
    const addressField = document.getElementById('client-address');
    const addressNote = document.getElementById('address-note');

    if (saved) {
      addressField.value = saved;
      addressNote.textContent = 'Saved address loaded — edit to update, or clear below.';
      addressNote.style.display = 'block';
    } else {
      addressField.value = '';
      addressNote.textContent = '';
      addressNote.style.display = 'none';
    }
  }

  function saveCurrentAddress() {
    const email = document.getElementById('client-email').value.trim();
    const address = document.getElementById('client-address').value.trim();
    if (!email || !address) return;
    const cache = getAddressCache();
    cache[email] = address;
    saveAddressCache(cache);
  }

  function clearClientAddress() {
    const email = document.getElementById('client-email').value.trim();
    if (!email) return;
    const cache = getAddressCache();
    delete cache[email];
    saveAddressCache(cache);
    document.getElementById('client-address').value = '';
    const addressNote = document.getElementById('address-note');
    addressNote.textContent = 'Address cleared.';
    addressNote.style.display = 'block';
    setTimeout(() => { addressNote.style.display = 'none'; }, 2500);
  }
  // ── MANUAL CLIENT ────────────────────────────────────────────────
  const MANUAL_CLIENTS_KEY = 'rh_manual_clients';

  function getManualClients() {
    try { return JSON.parse(localStorage.getItem(MANUAL_CLIENTS_KEY)) || []; } catch(e) { return []; }
  }

  function showManualClient() {
    const fields = document.getElementById('manual-client-fields');
    const phoneField = document.getElementById('client-phone');
    const isShowing = fields.style.display !== 'none';
    fields.style.display = isShowing ? 'none' : 'block';
    document.getElementById('manual-client-btn').textContent = isShowing ? '+ Add client manually' : '− Cancel';
    if (!isShowing) {
      document.getElementById('client-search').value = '';
      document.getElementById('client-email').value = '';
      phoneField.value = '';
      phoneField.readOnly = false;
      phoneField.style.opacity = '1';
      document.getElementById('client-address').value = '';
      document.getElementById('address-note').style.display = 'none';
      selectedClient = null;
    }
  }

  function saveManualClient(name, email, phone) {
    const clients = getManualClients();
    const existing = clients.findIndex(c => c.email === email);
    const entry = { name, email, phone };
    if (existing >= 0) clients[existing] = entry;
    else clients.push(entry);
    localStorage.setItem(MANUAL_CLIENTS_KEY, JSON.stringify(clients));
    const inAll = allClients.findIndex(c => c.email === email);
    if (inAll >= 0) allClients[inAll] = entry;
    else allClients.push(entry);
  }

  function validate() {
    const manualFields = document.getElementById('manual-client-fields');
    const isManual = manualFields.style.display !== 'none';
    if (isManual) {
      const manualName = document.getElementById('manual-name').value.trim();
      if (!manualName) { alert('Please enter the client name.'); return false; }
      // Copy manual name to search field for consistency
      document.getElementById('client-search').value = manualName;
    }
    const clientName = document.getElementById('client-search').value.trim();
    const clientEmail = document.getElementById('client-email').value.trim();
    const treatment = document.getElementById('treatment-select').value;
    const duration = document.getElementById('duration-select').value;
    const invoiceDate = document.getElementById('invoice-date').value;
    const treatmentDate = document.getElementById('treatment-date').value;

    if (!clientName) { alert('Please enter a client name.'); return false; }
    if (!clientEmail) { alert('Please enter a client email.'); return false; }
    if (!treatment) { alert('Please select a treatment.'); return false; }
    if (!duration) { alert('Please select a duration or package.'); return false; }
    if (!invoiceDate) { alert('Please enter an invoice date.'); return false; }
    if (!treatmentDate) { alert('Please enter a date of treatment.'); return false; }
    if (currentPrice <= 0) { alert('Price must be greater than 0.'); return false; }

    // Save manual client for future use
    if (isManual) {
      saveManualClient(
        document.getElementById('manual-name').value.trim(),
        clientEmail,
        document.getElementById('client-phone').value.trim()
      );
    }
    return true;
  }

  // ── PDF GENERATION ───────────────────────────────────────────────
  function getInvoiceData() {
    const discountVal = parseFloat(document.getElementById('discount-value').value) || 0;
    const subtotal = currentPrice;
    let discountAmount = 0;
    let discountLabel = '';

    if (discountType === 'pct' && discountVal > 0) {
      discountAmount = subtotal * (discountVal / 100);
      discountLabel = `${discountVal}%`;
    } else if (discountType === 'fixed' && discountVal > 0) {
      discountAmount = Math.min(discountVal, subtotal);
      discountLabel = `£${discountVal.toFixed(2)}`;
    }

    const total = subtotal - discountAmount;
    const treatmentName = document.getElementById('treatment-select').value;
    const durationOpt = document.getElementById('duration-select');
    const durationLabel = durationOpt.options[durationOpt.selectedIndex]?.text?.split(' —')[0] || '';

    // Always read from the editable field so amended numbers are respected
    currentInvoiceNumber = document.getElementById('invoice-number-display').value.trim() || currentInvoiceNumber;

    return {
      invoiceNumber: currentInvoiceNumber,
      invoiceDate: formatDate(document.getElementById('invoice-date').value),
      dueDate: formatDate(document.getElementById('due-date').value),
      treatmentDate: formatDate(document.getElementById('treatment-date').value),
      clientName: document.getElementById('client-search').value.trim(),
      clientEmail: document.getElementById('client-email').value.trim(),
      clientAddress: document.getElementById('client-address').value.trim(),
      treatment: `${durationLabel} ${treatmentName}`,
      subtotal, discountAmount, discountLabel, total,
      status: invoiceStatus === 'paid' ? 'PAID IN FULL' : 'UNPAID',
    };
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  // ── GENERATE & SEND ──────────────────────────────────────────────
  function generateInvoice() {
    if (!validate()) return;
    saveCurrentAddress();
    const data = getInvoiceData();
    const doc = buildPDF(data);

    // Download PDF
    const filename = `${data.invoiceNumber}-${data.clientName.replace(/\s+/g, '-')}.pdf`;
    doc.save(filename);

    // Open Gmail compose
    setTimeout(() => {
      const subject = encodeURIComponent(`Invoice ${data.invoiceNumber} — Rehab & Heal`);
      const body = encodeURIComponent(
        `Dear ${data.clientName},\n\nPlease find attached your invoice ${data.invoiceNumber} for your recent treatment at Rehab & Heal.\n\nTreatment: ${data.treatment}\nDate: ${data.treatmentDate}\nTotal: £${data.total.toFixed(2)}\nStatus: ${data.status}\n\nLooking forward to seeing you soon.`
      );
      const gmailUrl = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(data.clientEmail)}&su=${subject}&body=${body}`;
      window.open(gmailUrl, '_blank');
    }, 500);

    saveInvoiceNumber();
    alert(`Invoice ${data.invoiceNumber} generated and Gmail opened. Please attach the downloaded PDF before sending.`);
  }

  function downloadOnly() {
    if (!validate()) return;
    saveCurrentAddress();
    const data = getInvoiceData();
    const doc = buildPDF(data);
    const filename = `${data.invoiceNumber}-${data.clientName.replace(/\s+/g, '-')}.pdf`;
    doc.save(filename);
    saveInvoiceNumber();
  }
